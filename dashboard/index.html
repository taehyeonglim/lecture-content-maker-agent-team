<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lecture-content-maker — 진행상황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="h-screen overflow-hidden antialiased">
    <div class="relative z-10 flex h-screen w-full flex-col gap-3 px-4 py-3 sm:px-5">

      <!-- ─────────────── HEADER STRIP (단일 행, 컴팩트) ─────────────── -->
      <header class="hero-card flex items-center gap-5 px-5 py-3">
        <div class="min-w-0 flex-1">
          <span class="brand-mark text-[10px]">lecture-content-maker · multi-agent</span>
          <h1 id="course-name" class="mt-0.5 truncate text-xl font-bold tracking-tight"
              style="color: var(--text-strong)">
            코스 정보를 불러오는 중
          </h1>
        </div>

        <div class="hidden items-center gap-2 md:flex">
          <div class="metric-chip" aria-labelledby="usage-label">
            <span id="usage-label" class="metric-chip-label">사용량</span>
            <span id="cumulative-usage" class="metric-chip-value">0 토큰</span>
            <span id="session-duration" class="metric-chip-sub">0 호출 · -</span>
          </div>
          <div class="metric-chip" aria-labelledby="cost-label">
            <span id="cost-label" class="metric-chip-label">USD</span>
            <span id="cumulative-cost" class="metric-chip-value">$0.00</span>
            <span class="metric-chip-sub">pricing.json</span>
          </div>
          <div class="metric-chip" aria-labelledby="updated-label">
            <span id="updated-label" class="metric-chip-label">갱신</span>
            <time id="updated-at" datetime="" class="metric-chip-value">-</time>
            <span class="metric-chip-sub">2초 폴링</span>
          </div>
        </div>

        <div class="flex w-44 flex-col gap-1">
          <div class="flex items-center justify-between">
            <span class="text-[9px] font-bold uppercase tracking-wider"
                  style="color: var(--text-muted)">진행률</span>
            <output id="overall-progress-value" class="mono-number text-xs font-bold"
                    style="color: var(--text-strong)">0%</output>
          </div>
          <div id="overall-progress" class="progress-track h-1.5"
               role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div data-progress-fill class="progress-bar" style="width: 0"></div>
          </div>
        </div>
      </header>

      <!-- ─────────────── MAIN GRID (좌: 챕터 + 차트 / 우: 사이드 패널) ─────────────── -->
      <main class="grid min-h-0 flex-1 gap-3 lg:grid-cols-[minmax(0,1fr)_22rem]">

        <!-- 좌측: 챕터 카드 (상단) + 차트 (하단) -->
        <div class="grid min-h-0 grid-rows-[minmax(0,1fr)_15rem] gap-3">

          <section aria-labelledby="chapters-title" class="min-h-0 flex flex-col">
            <div class="mb-2 flex items-center justify-between gap-3">
              <h2 id="chapters-title" class="section-title text-sm">챕터 진행상황</h2>
              <div class="flex flex-wrap gap-1.5">
                <span class="status-pill status-queued"><span class="status-dot"></span>queued</span>
                <span class="status-pill status-running"><span class="status-dot"></span>running</span>
                <span class="status-pill status-review"><span class="status-dot"></span>review</span>
                <span class="status-pill status-done"><span class="status-dot"></span>done</span>
                <span class="status-pill status-failed"><span class="status-dot"></span>failed</span>
              </div>
            </div>
            <div id="chapter-grid"
                 class="grid min-h-0 flex-1 grid-cols-1 gap-3 overflow-y-auto md:grid-cols-2 2xl:grid-cols-3"
                 aria-live="polite">
              <article class="dashboard-card p-4 text-sm"
                       style="color: var(--text-muted)">
                STATE.json 데이터를 기다리는 중...
              </article>
            </div>
          </section>

          <section aria-labelledby="usage-chart-title" class="dashboard-card flex flex-col p-3">
            <div class="mb-1.5 flex items-center justify-between gap-3">
              <h2 id="usage-chart-title" class="section-title text-sm">사용량 추이 (모델별)</h2>
              <p class="text-[10px]" style="color: var(--text-muted)">6분 · 2초 폴링</p>
            </div>
            <div class="relative min-h-0 flex-1">
              <canvas id="usage-chart"></canvas>
            </div>
          </section>

        </div>

        <!-- 우측: 활성 에이전트 (위) + 최근 이벤트 (아래, flex-1 스크롤) -->
        <aside class="flex min-h-0 flex-col gap-3">

          <section class="dashboard-card p-3" aria-labelledby="agents-title">
            <div class="mb-2 flex items-center justify-between gap-3">
              <h2 id="agents-title" class="section-title text-sm">활성 에이전트</h2>
              <span id="active-agents-count" class="mono-number rounded-full px-2 py-0.5 text-[10px] font-bold"
                    style="background: color-mix(in srgb, var(--accent) 18%, transparent);
                           color: var(--accent);
                           border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);">0</span>
            </div>
            <ul id="active-agents" class="flex flex-wrap gap-1.5" aria-live="polite">
              <li class="rounded-md border border-dashed px-2.5 py-1 text-[11px]"
                  style="border-color: var(--border-strong); color: var(--text-muted)">대기 중</li>
            </ul>
          </section>

          <section class="dashboard-card flex min-h-0 flex-1 flex-col p-3" aria-labelledby="events-title">
            <div class="mb-2 flex items-center justify-between gap-3">
              <h2 id="events-title" class="section-title text-sm">최근 이벤트</h2>
              <span class="text-[10px]" style="color: var(--text-muted)">최근 10개</span>
            </div>
            <ol id="recent-events" class="space-y-0.5 overflow-y-auto pr-1" aria-live="polite">
              <li class="rounded-md border border-dashed px-2.5 py-1.5 text-[11px]"
                  style="border-color: var(--border-strong); color: var(--text-muted)">이벤트 없음</li>
            </ol>
          </section>

        </aside>

      </main>
    </div>

    <script src="poll.js"></script>
  </body>
</html>
